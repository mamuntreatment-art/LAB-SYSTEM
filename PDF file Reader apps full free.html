<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Auto List Viewer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    height:100vh;
    overflow:hidden;
    background:#f1f5f9;
}

/* HEADER */
header{
    background:#1976d2;
    color:white;
    padding:12px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:18px;
    font-weight:bold;
}

.toggle-btn{
    background:#ff9800;
    border:none;
    padding:8px 12px;
    color:white;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar{
    width:320px;
    background:#fff;
    border-right:1px solid #ddd;
    overflow:hidden;
    transition:0.3s;
    display:flex;
    flex-direction:column;
}

/* hide sidebar */
.sidebar.hide{
    width:0;
}

/* UPLOAD BOX */
.upload-box{
    padding:10px;
    border-bottom:1px solid #ddd;
    background:#fafafa;
}

input[type=file]{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:6px;
    cursor:pointer;
}

/* LIST */
.list{
    flex:1;
    overflow-y:auto;
}

.pdf-item{
    padding:12px;
    border-bottom:1px solid #eee;
    cursor:pointer;
    word-break:break-word;
}

.pdf-item:hover{
    background:#e3f2fd;
}

.active{
    background:#bbdefb;
    font-weight:bold;
}

.empty{
    padding:20px;
    text-align:center;
    color:#777;
}

/* VIEWER */
.viewer{
    flex:1;
    background:#cfd8dc;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>
<body>

<header>
    <div>PDF Viewer</div>

    <!-- HEADER TOGGLE -->
    <button class="toggle-btn" onclick="toggleList()">
        Hide / Show List
    </button>
</header>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">

        <!-- BROWSE OPTION -->
        <div class="upload-box">
            <input type="file" id="pdfInput" multiple accept="application/pdf">
        </div>

        <!-- LIST -->
        <div class="list" id="pdfList">
            <div class="empty">No PDF Selected</div>
        </div>

    </div>

    <!-- VIEWER -->
    <div class="viewer">
        <iframe id="viewer"></iframe>
    </div>

</div>

<script>

const pdfInput = document.getElementById("pdfInput");
const pdfList = document.getElementById("pdfList");
const viewer = document.getElementById("viewer");
const sidebar = document.getElementById("sidebar");

let pdfStore = [];

/* Hide / Show List */
function toggleList(){
    sidebar.classList.toggle("hide");
}

/* Add PDFs */
pdfInput.addEventListener("change", function(){

    const files = Array.from(this.files);

    files.forEach(file => {

        if(!pdfStore.find(f => f.name === file.name)){
            pdfStore.push(file);
        }
    });

    renderList();
});

function renderList(){

    pdfList.innerHTML = "";

    if(pdfStore.length === 0){
        pdfList.innerHTML = `<div class="empty">No PDF Selected</div>`;
        return;
    }

    pdfStore.forEach((file, index)=>{

        const item = document.createElement("div");
        item.className = "pdf-item";
        item.textContent = "📄 " + file.name;

        item.onclick = ()=>{

            document.querySelectorAll(".pdf-item")
            .forEach(i => i.classList.remove("active"));

            item.classList.add("active");

            viewer.src = URL.createObjectURL(file);
        };

        pdfList.appendChild(item);

        // auto open first
        if(index === 0){
            item.click();
        }
    });
}

</script>

</body>
</html>
