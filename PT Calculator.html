<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    transition: 0.3s;
}

.dark {
    background: #121212;
    color: #eee;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    transition: 0.3s;
}

.dark .container {
    background: #1e1e1e;
}

/* Row */
.row {
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
}

input {
    padding: 8px;
    width: 50%;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
}

/* Result */
.result {
    margin-top: 15px;
    background: #eaf7ea;
    padding: 10px;
    border-radius: 5px;
}

.dark .result {
    background: #2e4d2e;
}

/* Developer Card */
.dev-card {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    background: #fff;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.dark .dev-card {
    background: #2a2a2a;
}

/* Profile Image */
.profile {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    margin-bottom: 10px;
}

/* Buttons */
.contact-btn {
    display: block;
    margin: 8px auto;
    padding: 8px;
    width: 80%;
    border-radius: 5px;
    text-decoration: none;
    color: white;
}

.call {
    background: #28a745;
}

.whatsapp {
    background: #25D366;
}

/* Dark toggle */
.toggle {
    text-align: right;
    cursor: pointer;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="toggle" onclick="toggleDark()">🌙 Dark Mode</div>

    <h2>PT Calculator</h2>

    <div class="row">
        <label>Patient:</label>
        <input type="number" id="patient" value="16">
    </div>

    <div class="row">
        <label>Control:</label>
        <input type="number" id="control" value="13">
    </div>

    <div class="row">
        <label>ISI:</label>
        <input type="number" id="isi" value="1.1">
    </div>

    <button onclick="calculate()">Calculate</button>

    <div class="result">
        <p>Ratio: <span id="ratio">-</span></p>
        <p>Index: <span id="index">-</span></p>
        <p>INR: <span id="inr">-</span></p>
    </div>

    <!-- Developer Card -->
    <div class="dev-card">
        <img src="https://via.placeholder.com/80" class="profile">

        <h3>MD MAMUN MIAH</h3>
        <p>Medical Technologist (Lab)</p>

        <a href="tel:01854000045" class="contact-btn call">📞 Call Now</a>

        <a href="https://wa.me/8801854000045" target="_blank" 
           class="contact-btn whatsapp">💬 WhatsApp</a>

        <p>✉️ md.mamun8@gmail.com</p>
    </div>

</div>

<script>
function calculate() {
    let patient = parseFloat(document.getElementById('patient').value);
    let control = parseFloat(document.getElementById('control').value);
    let isi = parseFloat(document.getElementById('isi').value);

    if (isNaN(patient) || isNaN(control) || isNaN(isi) || patient === 0 || control === 0) {
        alert("Enter valid values");
        return;
    }

    let ratio = patient / control;
    let index = (control / patient) * 100;
    let inr = Math.pow(ratio, isi);

    document.getElementById('ratio').innerText = ratio.toFixed(2);
    document.getElementById('index').innerText = index.toFixed(2);
    document.getElementById('inr').innerText = inr.toFixed(2);
}

function toggleDark() {
    document.body.classList.toggle("dark");
}

window.onload = calculate;
</script>

</body>
</html>
